<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sixtens Monsterlab</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#140d26; --panel:#241740; --panel2:#2f1e52;
    --slime:#8dff5a; --orange:#ffab3d; --lav:#cdbcf5; --red:#ff5470;
    --shadow:0 6px 0 rgba(0,0,0,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:var(--bg);
    background-image:radial-gradient(circle at 20% 10%, #2a1a4d 0%, transparent 45%),
                     radial-gradient(circle at 85% 90%, #1e2a12 0%, transparent 40%);
    font-family:'Nunito',sans-serif; color:var(--lav);
    display:flex; flex-direction:column; align-items:center;
    min-height:100dvh; overflow-x:hidden;
  }
  .disp{font-family:'Bangers',cursive; letter-spacing:2px;}

  header{
    width:100%; max-width:520px; display:flex; align-items:center;
    justify-content:space-between; padding:14px 16px 4px;
  }
  header h1{font-family:'Bangers',cursive; letter-spacing:2px; font-size:28px; color:var(--slime); margin:0; text-shadow:0 0 12px rgba(141,255,90,.45);}
  #bagBtn{
    background:var(--panel2); border:3px solid var(--orange); color:var(--orange);
    border-radius:14px; font-family:'Nunito'; font-weight:900; font-size:16px;
    padding:8px 12px; box-shadow:var(--shadow); cursor:pointer;
  }
  #bagBtn:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.35);}

  #stage{
    width:min(92vw,480px); margin-top:6px; background:var(--panel);
    border-radius:26px; padding:16px 14px 18px; text-align:center;
    border:3px solid #3d2a6b; position:relative; overflow:hidden;
  }
  #monsterName{font-family:'Bangers',cursive; letter-spacing:2px; font-size:26px; color:var(--orange); margin:0 0 2px;}
  #stageLabel{font-weight:900; font-size:14px; opacity:.85; margin:0 0 6px;}
  #pit{
    height:200px; display:flex; align-items:flex-end; justify-content:center;
    position:relative;
  }
  #pit::after{
    content:""; position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
    width:190px; height:26px; border-radius:50%;
    background:radial-gradient(ellipse, rgba(141,255,90,.4), transparent 70%);
    filter:blur(2px);
  }
  #monster{
    position:relative; z-index:2; transform-origin:bottom center;
    animation:wobble 2.6s ease-in-out infinite; line-height:0;
  }
  #monster.egg{animation:eggRock 2.8s ease-in-out infinite;}
  #monster.chomp{animation:chomp .5s ease;}
  #monster.shake{animation:shake .45s ease;}
  #monster svg{display:block;}
  @keyframes wobble{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-6px)}}
  @keyframes eggRock{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  @keyframes chomp{0%{transform:scale(1)}35%{transform:scale(1.3) rotate(-5deg)}70%{transform:scale(.92)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}50%{transform:translateX(10px)}75%{transform:translateX(-6px)}}

  #meter{display:flex; gap:8px; justify-content:center; margin-top:4px; font-size:26px;}
  .snack{opacity:.25; transition:all .3s; transform:scale(.9); filter:drop-shadow(0 0 6px rgba(141,255,90,0));}
  .snack.full{opacity:1; transform:scale(1.15); filter:drop-shadow(0 0 6px rgba(141,255,90,.8));}

  #chompWord{
    position:absolute; top:2px; left:50%; transform:translate(-50%,0) scale(0);
    font-family:'Bangers'; letter-spacing:2px; font-size:36px; color:var(--slime); z-index:6;
    text-shadow:0 0 10px rgba(141,255,90,.7), 0 2px 4px rgba(0,0,0,.6); pointer-events:none;
    white-space:nowrap;
  }
  #chompWord.show{animation:popWord .8s ease forwards;}
  @keyframes popWord{0%{transform:translate(-50%,0) scale(0)}30%{transform:translate(-50%,-4px) scale(1.2)}60%{transform:translate(-50%,-8px) scale(1)}100%{transform:translate(-50%,-24px) scale(.8); opacity:0}}

  #problemCard{
    width:min(92vw,480px); margin-top:14px; background:var(--panel2);
    border:3px solid #46307c; border-radius:22px; padding:12px; text-align:center;
  }
  #feedLine{font-weight:900; font-size:15px; margin:0 0 4px; color:var(--lav);}
  #problem{font-size:50px; font-weight:900; color:#fff; margin:0; letter-spacing:2px;}
  #answers{
    width:min(92vw,480px); display:flex; gap:12px; margin:14px 0 26px;
  }
  .ans{
    flex:1; font-family:'Nunito'; font-weight:900; font-size:38px; color:#1a0f33;
    background:var(--orange); border:none; border-radius:20px; padding:20px 0;
    box-shadow:var(--shadow); cursor:pointer; transition:background .2s;
  }
  .ans:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.35);}
  .ans.nope{background:var(--red); color:#fff; animation:shake .45s ease;}
  .ans.yes{background:var(--slime);}

  .overlay{
    position:fixed; inset:0; background:rgba(10,5,25,.92); z-index:40;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px 12px; gap:14px; overflow-x:hidden;
  }
  .overlay.show{display:flex;}
  .overlay h2{font-family:'Bangers'; letter-spacing:3px; font-size:46px; margin:0; color:var(--orange); text-shadow:0 0 16px rgba(255,171,61,.6);}
  #evolveArt{animation:wobble 1.8s ease-in-out infinite; line-height:0;}
  .overlay p{font-size:19px; font-weight:900; margin:0; max-width:340px;}
  .bigBtn{
    font-family:'Bangers',cursive; font-size:26px; letter-spacing:2px;
    background:var(--slime); color:#10240a; border:none; border-radius:18px;
    padding:12px 34px; box-shadow:var(--shadow); cursor:pointer;
  }
  .bigBtn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.35);}

  #bag{align-items:stretch; justify-content:flex-start; overflow-y:auto; padding-top:20px;}
  #bag h2{align-self:center;}
  #grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(104px,1fr));
    gap:12px; width:min(100%,520px); margin:8px auto 20px;
  }
  .card{
    background:var(--panel); border:3px solid #3d2a6b; border-radius:18px;
    padding:10px 6px 8px; text-align:center;
  }
  .card .art{line-height:0; display:flex; justify-content:center;}
  .card .n{font-weight:900; font-size:13px; margin-top:4px; color:var(--lav);}
  .card.got{border-color:var(--slime); box-shadow:0 0 12px rgba(141,255,90,.25);}
  .card.mys .art{filter:brightness(0) opacity(.55);}
  .card.mys .n{opacity:.5;}
  #closeBag{align-self:center; margin-bottom:30px;}

  .confetti{position:fixed; top:-20px; font-size:22px; z-index:60; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  /* ---------- levende monstre ---------- */
  .blink{animation:blink 4.2s infinite; transform-box:fill-box; transform-origin:center;}
  @keyframes blink{0%,91%,97%,100%{transform:scaleY(1)}94%{transform:scaleY(0.06)}}
  .munch{animation:munch 3.6s ease-in-out infinite; transform-box:fill-box; transform-origin:center top;}
  @keyframes munch{0%,78%,100%{transform:scaleY(1)}86%{transform:scaleY(0.5)}93%{transform:scaleY(1.12)}}
  .waveR{animation:waveR 3.2s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 12%;}
  @keyframes waveR{0%,68%,100%{transform:rotate(0deg)}76%{transform:rotate(-22deg)}84%{transform:rotate(16deg)}92%{transform:rotate(-12deg)}}
  .flick{animation:flick 1.5s ease-in-out infinite; transform-box:fill-box; transform-origin:center bottom;}
  @keyframes flick{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.18) scaleX(.9)}}
  .tent{transform-box:fill-box; transform-origin:center top; animation:tentwig 2.6s ease-in-out infinite;}
  @keyframes tentwig{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-3deg)}}
  @media (prefers-reduced-motion: reduce){
    .blink,.munch,.waveR,.flick,.tent,#monster,#evolveArt{animation:none;}
  }

  /* ---------- monsterinfo (dex) ---------- */
  #dex{justify-content:center;}
  #dexCard{
    background:var(--panel); border:3px solid var(--slime); border-radius:24px;
    width:min(100%,440px); padding:18px 14px; text-align:center;
    box-shadow:0 0 24px rgba(141,255,90,.2);
  }
  #dexName{font-family:'Bangers'; letter-spacing:3px; font-size:34px; color:var(--slime); margin:0;}
  #dexChain{display:flex; align-items:flex-end; justify-content:center; gap:2px; margin:10px 0 4px; flex-wrap:wrap;}
  .chainStep{display:flex; flex-direction:column; align-items:center;}
  .chainStep .cn{font-weight:900; font-size:12px; margin-top:2px; color:var(--lav);}
  .chainArrow{font-family:'Bangers'; font-size:26px; color:var(--orange); padding:0 2px 34px;}
  #dexFacts{
    background:var(--panel2); border:3px solid #46307c; border-radius:16px;
    padding:12px; margin:10px 0 14px; text-align:left; font-weight:900; font-size:15px;
  }
  #dexFacts .row{margin:4px 0;}
  #dexFacts .lbl{color:var(--orange);}
  .card.got{cursor:pointer;}
  .card.got:active{transform:scale(.94);}
</style>
</head>
<body>

<header>
  <h1>SIXTENS MONSTERLAB</h1>
  <button id="bagBtn">👜 <span id="bagCount">0</span>/16</button>
</header>

<div id="stage">
  <h2 id="monsterName">???</h2>
  <p id="stageLabel">Et mystisk æg...</p>
  <div id="pit"><div id="chompWord">GNASK!</div><div id="monster" class="egg"></div></div>
  <div id="meter"></div>
</div>

<div id="problemCard">
  <p id="feedLine">Fodr mig med svaret!</p>
  <p id="problem">3 + 2 = ?</p>
</div>
<div id="answers"></div>

<div class="overlay" id="evolveOverlay">
  <h2 id="evolveTitle">ÆGGET KLÆKKEDE!</h2>
  <div id="evolveArt"></div>
  <p id="evolveText"></p>
  <button class="bigBtn" id="evolveBtn">FODR VIDERE!</button>
</div>

<div class="overlay" id="bag">
  <h2 class="disp">MONSTERSAMLING</h2>
  <div id="grid"></div>
  <button class="bigBtn" id="closeBag">TILBAGE TIL LABBET</button>
</div>

<div class="overlay" id="dex">
  <div id="dexCard">
    <h2 id="dexName">GLUMKONGE</h2>
    <div id="dexChain"></div>
    <div id="dexFacts"></div>
    <button class="bigBtn" id="closeDex">TILBAGE</button>
  </div>
</div>

<script>
/*MONSTER-ART-START*/
const MONSTERS=[
  {id:"gluma", names:["Gluma","Glumzor","Glumkonge"],
   c:{m:"#b06ce8",d:"#7a3fbd",b:"#e2c6ff",i:"#5a2a9e"}, feats:["horns"], f3:["wings"],
   fakta:{om:"Glumkonge er konge over alle grumme grotter. Den brummer højt, når den er glad.", mad:"Slikkepinde og mørke", lyd:"GRRRUM!"}},
  {id:"flam", names:["Flamli","Flamzar","Flamdrage"],
   c:{m:"#ff6b4a",d:"#d63f1f",b:"#ffd2a8",i:"#a32b0f"}, feats:["flame"], f3:["wings","spikes"],
   fakta:{om:"Flamdrage kan riste 100 skumfiduser på ét sekund med sit ildpust.", mad:"Chili og grillpølser", lyd:"FSSSH-RAAR!"}},
  {id:"slim", names:["Slimo","Slimgab","Slimtitan"],
   c:{m:"#6fdd4e",d:"#3fa32a",b:"#d0ffb8",i:"#2b7a1a"}, eyes:1, feats:["drips"], f3:["spikes"],
   fakta:{om:"Slimtitan efterlader grønne slimspor overalt. Dens ene øje kan se i mørke.", mad:"Grøn budding", lyd:"BLUB-BLUB!"}},
  {id:"skyg", names:["Skyggi","Skyggrol","Skyggefyrste"],
   c:{m:"#5f6cf0",d:"#3a44b8",b:"#c3c8ff",i:"#252a7a"}, feats:["ghost"], f3:["wings"],
   fakta:{om:"Skyggefyrste kan svæve lige igennem vægge og elsker at råbe BØH!", mad:"Skygger og natmad", lyd:"UUUUH-HIHI!"}},
  {id:"tand", names:["Tandi","Tandrak","Tandgigant"],
   c:{m:"#ffab3d",d:"#d97f10",b:"#ffe3b3",i:"#9c5a05"}, toothy:true, feats:["horns"],
   fakta:{om:"Tandgigant har 74 tænder og børster dem aldrig. Dens bid kan knuse sten.", mad:"Alt! Helst sten", lyd:"KNAS-KNAS!"}},
  {id:"isbo", names:["Isbo","Isgrold","Isdæmon"],
   c:{m:"#6fd8ff",d:"#2fa0d9",b:"#dff6ff",i:"#0f6a9e"}, feats:["crystals"],
   fakta:{om:"Isdæmon fryser alt, den rører ved. Om sommeren gemmer den sig i fryseren.", mad:"Ispinde og snebolde", lyd:"BRRRRR!"}},
  {id:"spark", names:["Sparki","Sparkzap","Tordentrold"],
   c:{m:"#ffd93d",d:"#d9a410",b:"#fff3b8",i:"#8a6a00"}, feats:["bolt"], f3:["spikes"],
   fakta:{om:"Tordentrold laver lyn, når den nyser. Rør den aldrig med våde hænder!", mad:"Batterier", lyd:"ZAP-KRAKOW!"}},
  {id:"blaek", names:["Blækki","Blækgab","Blækkraken"],
   c:{m:"#2fb5a3",d:"#1b7f72",b:"#bdf2ea",i:"#0c5a50"}, feats:["tentacles"],
   fakta:{om:"Blækkraken kan kilde tre monstre på én gang med sine fangarme.", mad:"Fiskepinde", lyd:"SPLASK!"}},
  {id:"flag", names:["Flagli","Flagrym","Natflagger"],
   c:{m:"#c93cc9",d:"#8f1f94",b:"#f0c2f2",i:"#6a1270"}, feats:["ears"], f3:["wings"],
   fakta:{om:"Natflagger sover hele dagen med hovedet nedad og flyver om kap med ugler om natten.", mad:"Natsværmere og saftevand", lyd:"SKRIIIK!"}},
  {id:"imp", names:["Impi","Impzor","Impdjævel"],
   c:{m:"#d1264a",d:"#8f1030",b:"#f5b8c4",i:"#6e0a22"}, feats:["horns","tail"],
   fakta:{om:"Impdjævel er en drillepind, der gemmer folks venstre sokker.", mad:"Lakrids og chilisovs", lyd:"HIHIHI!"}},
  {id:"zorb", names:["Zorbi","Zorbak","Zorbhersker"],
   c:{m:"#57e6a9",d:"#27a874",b:"#d2fceb",i:"#0f6e48"}, feats:["antenna"], f3:["spikes"],
   fakta:{om:"Zorbhersker kommer fra planeten Zorb og forstår alle sprog – undtagen 'ryd op'.", mad:"Måneost", lyd:"BLIP-BLOP!"}},
  {id:"sten", names:["Stenli","Stengrol","Stentrold"],
   c:{m:"#9aa0a8",d:"#5f666f",b:"#dfe3e8",i:"#3c4148"}, feats:["spikes"], f3:["horns"],
   fakta:{om:"Stentrold er 1000 år gammel og kan stå helt stille i en hel uge.", mad:"Grus med sovs", lyd:"KRRRNK!"}},
  {id:"gift", names:["Gifti","Giftgob","Giftmester"],
   c:{m:"#ff6bb5",d:"#c92f7e",b:"#ffd4e9",i:"#8f1a56"}, feats:["drips","tail"],
   fakta:{om:"Giftmester blander bobler, der lugter af rådne æg. Rør aldrig de lilla!", mad:"Muggen ost", lyd:"FUJJJ!"}},
  {id:"mud", names:["Mudri","Mudgrol","Mudderkonge"],
   c:{m:"#a97142",d:"#74491f",b:"#e3c9a8",i:"#4f3012"}, eyes:1, toothy:true, feats:[], f3:["spikes"],
   fakta:{om:"Mudderkonge elsker regnvejr og laver verdens største mudderkager.", mad:"Regnorme (bvadr!)", lyd:"SPLAT!"}},
  {id:"kryb", names:["Krybli","Krybzor","Krybherre"],
   c:{m:"#7a5c96",d:"#4d3566",b:"#d6c4e8",i:"#2e1c42"}, feats:["antenna","spikes"],
   fakta:{om:"Krybherre kribler og krabler om natten og kilder folk med sine følehorn.", mad:"Støvkugler under sengen", lyd:"KRIBLE-KRABLE!"}},
  {id:"storm", names:["Skyli","Skygrom","Stormherre"],
   c:{m:"#7f9ac9",d:"#4d6699",b:"#dbe5f5",i:"#2b3f66"}, feats:["bolt"], f3:["wings"],
   fakta:{om:"Stormherre bor i tordenskyer og bowler med lyn, når det buldrer.", mad:"Hagl og blæst", lyd:"BUUUM-KRAKA!"}},
];

// Geometry per form (1=baby, 2=mid, 3=final) in a 200x200 viewBox
const GEO={
  1:{cy:148,rx:42,ry:38,eyeY:140,eyeDx:16,eyeR:11,mouthY:160},
  2:{cy:124,rx:54,ry:58,eyeY:106,eyeDx:20,eyeR:12,mouthY:140},
  3:{cy:118,rx:70,ry:66,eyeY:96, eyeDx:27,eyeR:13,mouthY:134},
};
function bodyTopY(g,dx){ // y of the body edge at horizontal offset dx
  const t=Math.max(0,1-(dx*dx)/(g.rx*g.rx));
  return g.cy-g.ry*Math.sqrt(t);
}
function eyes(m,g,st){
  const single=m.eyes===1;
  const dly=(-(3.45+Math.random()*0.5)).toFixed(2); // negativ delay: første blink inden for 0,5 s
  function one(cx,r){
    return `<g class="blink" style="animation-delay:${dly}s">`+
      `<ellipse cx="${cx}" cy="${g.eyeY}" rx="${r}" ry="${r*1.15}" fill="#fff"/>`+
      `<circle cx="${cx}" cy="${g.eyeY+2}" r="${(r*0.62).toFixed(1)}" fill="${m.c.i}"/>`+
      `<circle cx="${cx}" cy="${g.eyeY+2}" r="${(r*0.34).toFixed(1)}" fill="#1a1026"/>`+
      `<circle cx="${(cx-r*0.22).toFixed(1)}" cy="${(g.eyeY-r*0.28).toFixed(1)}" r="${(r*0.18).toFixed(1)}" fill="#fff"/>`+
      `</g>`;
  }
  let s= single ? one(100,g.eyeR*1.55) : one(100-g.eyeDx,g.eyeR)+one(100+g.eyeDx,g.eyeR);
  if(st===3){ // angry brows
    const bx= single? g.eyeR*1.55 : g.eyeR;
    if(single){
      s+=`<path d="M ${100-bx-8} ${g.eyeY-bx-10} L ${100-2} ${g.eyeY-bx-2}" stroke="${m.c.d}" stroke-width="7" stroke-linecap="round" fill="none"/>`+
         `<path d="M ${100+bx+8} ${g.eyeY-bx-10} L ${100+2} ${g.eyeY-bx-2}" stroke="${m.c.d}" stroke-width="7" stroke-linecap="round" fill="none"/>`;
    }else{
      s+=`<path d="M ${100-g.eyeDx-14} ${g.eyeY-20} L ${100-g.eyeDx+9} ${g.eyeY-12}" stroke="${m.c.d}" stroke-width="7" stroke-linecap="round" fill="none"/>`+
         `<path d="M ${100+g.eyeDx+14} ${g.eyeY-20} L ${100+g.eyeDx-9} ${g.eyeY-12}" stroke="${m.c.d}" stroke-width="7" stroke-linecap="round" fill="none"/>`;
    }
  }
  return s;
}
function mouth(m,g,st){
  const y=g.mouthY;
  const toothy=m.toothy;
  const wrap=inner=>`<g class="munch" style="animation-delay:${(-(2.6+Math.random()*0.45)).toFixed(2)}s">${inner}</g>`;
  if(st===1 && !toothy){
    return wrap(`<path d="M ${100-12} ${y} Q 100 ${y+10} ${100+12} ${y}" stroke="#1a1026" stroke-width="4" fill="none" stroke-linecap="round"/>`+
      `<path d="M ${100-8} ${y+2} l 3.5 8 l 3.5 -7 Z" fill="#fff"/>`+
      `<path d="M ${100+1} ${y+2.5} l 3.5 7.5 l 3.5 -7 Z" fill="#fff"/>`);
  }
  const w= (toothy? 26:20)+st*7;
  const h= (toothy? 14:10)+st*4;
  const n= (toothy? 3:1)+st;
  let teeth="";
  const step=(w*2-8)/n;
  for(let i=0;i<n;i++){
    const tx=100-w+6+i*step;
    teeth+=`<path d="M ${tx.toFixed(1)} ${y+1} l ${(step*0.32).toFixed(1)} ${h*0.62} l ${(step*0.32).toFixed(1)} ${-h*0.62} Z" fill="#fff"/>`;
  }
  return wrap(`<path d="M ${100-w} ${y} Q 100 ${y+h*1.9} ${100+w} ${y} Q 100 ${y+h*0.7} ${100-w} ${y} Z" fill="#3b0f14"/>`+teeth);
}
function hornsF(m,g,st){
  const top=g.cy-g.ry, h=12+st*9, x=g.rx*0.52;
  function horn(sgn){
    const bx=100+sgn*x;
    return `<path d="M ${bx-sgn*4} ${top+12} Q ${bx+sgn*6} ${top+2} ${bx+sgn*10} ${top-h} Q ${bx+sgn*13} ${top+4} ${bx+sgn*16} ${top+16} Z" fill="${m.c.d}"/>`;
  }
  return horn(-1)+horn(1);
}
function flameF(m,g,st){
  const top=g.cy-g.ry, h=16+st*11;
  return `<g class="flick">`+
    `<path d="M ${100-9-st*2} ${top+6} Q ${100-13-st*3} ${top-h*0.55} 100 ${top-h} Q ${100+13+st*3} ${top-h*0.55} ${100+9+st*2} ${top+6} Z" fill="#ff8a2a"/>`+
    `<path d="M ${100-5} ${top+5} Q ${100-6} ${top-h*0.4} 100 ${top-h*0.62} Q ${100+6} ${top-h*0.4} ${100+5} ${top+5} Z" fill="#ffd93d"/>`+
    `</g>`;
}
function spikesF(m,g,st){
  const n= st>=3?5:3, span=g.rx*1.2, step=span*2/(n+1);
  let s="";
  for(let i=1;i<=n;i++){
    const dx=-span+i*step;
    const by=bodyTopY(g,dx)+6;
    const h=12+st*5-Math.abs(dx)*0.12;
    s+=`<path d="M ${(100+dx-8).toFixed(1)} ${by.toFixed(1)} L ${(100+dx).toFixed(1)} ${(by-h).toFixed(1)} L ${(100+dx+8).toFixed(1)} ${by.toFixed(1)} Z" fill="${m.c.d}"/>`;
  }
  return s;
}
function crystalsF(m,g,st){
  const n=2+st, span=g.rx*1.05, step=span*2/(n+1);
  let s="";
  for(let i=1;i<=n;i++){
    const dx=-span+i*step;
    const by=bodyTopY(g,dx)+6;
    const h=14+st*7-Math.abs(dx)*0.15;
    s+=`<path d="M ${(100+dx-6).toFixed(1)} ${by.toFixed(1)} L ${(100+dx).toFixed(1)} ${(by-h).toFixed(1)} L ${(100+dx+6).toFixed(1)} ${by.toFixed(1)} L ${(100+dx).toFixed(1)} ${(by+5).toFixed(1)} Z" fill="#eafcff" stroke="${m.c.d}" stroke-width="2"/>`;
  }
  return s;
}
function boltF(m,g,st){
  const x=100+g.rx*0.72, y=g.cy-g.ry*0.95, s=0.9+st*0.35;
  return `<path transform="translate(${x} ${y}) scale(${s}) rotate(18)" d="M 0 0 L 12 0 L 5 11 L 14 11 L -3 30 L 2 15 L -5 15 Z" fill="#ffe95e" stroke="${m.c.d}" stroke-width="2.5" stroke-linejoin="round"/>`;
}
function wingsF(m,g){
  const top=g.cy-g.ry*0.55, x=g.rx*0.8, w=g.rx*0.95, h=g.ry*0.9;
  function wing(sgn){
    const bx=100+sgn*x;
    return `<path d="M ${bx} ${top+10} Q ${bx+sgn*w} ${top-h*0.55} ${bx+sgn*w*1.1} ${top+6} L ${bx+sgn*w*0.75} ${top+10} L ${bx+sgn*w*0.62} ${top+26} L ${bx+sgn*w*0.32} ${top+22} Z" fill="${m.c.d}"/>`;
  }
  return wing(-1)+wing(1);
}
function tentaclesF(m,g,st){
  const n=3+st, base=g.cy+g.ry-16, span=g.rx*0.75, step=span*2/(n-1);
  let s="";
  for(let i=0;i<n;i++){
    const x=100-span+i*step, dir=i%2?1:-1;
    s+=`<g class="tent" style="animation-delay:${(-(i*0.35)).toFixed(2)}s">`+
       `<path d="M ${x.toFixed(1)} ${base} q ${dir*8} 12 ${dir*2} 22 q ${-dir*4} 7 ${-dir*10} 6" stroke="${m.c.m}" stroke-width="11" fill="none" stroke-linecap="round"/>`+
       `<circle cx="${(x-dir*10).toFixed(1)}" cy="${base+27}" r="4.5" fill="${m.c.d}"/>`+
       `</g>`;
  }
  return s;
}
function ghostTail(g,panelColor){
  const y=g.cy+g.ry-10, n=4, span=g.rx*0.95, step=span*2/n;
  let s="";
  for(let i=0;i<n;i++){
    const x=100-span+i*step;
    s+=`<path d="M ${x.toFixed(1)} ${y+12} Q ${(x+step/2).toFixed(1)} ${y-10} ${(x+step).toFixed(1)} ${y+12} L ${(x+step).toFixed(1)} ${y+30} L ${x.toFixed(1)} ${y+30} Z" fill="${panelColor}"/>`;
  }
  return s;
}
function dripsF(m,g){
  return `<circle cx="${100-g.rx*0.55}" cy="${g.cy-g.ry*0.4}" r="5" fill="${m.c.d}" opacity=".7"/>`+
    `<circle cx="${100+g.rx*0.5}" cy="${g.cy-g.ry*0.15}" r="4" fill="${m.c.d}" opacity=".7"/>`+
    `<ellipse cx="100" cy="${g.cy+g.ry-2}" rx="${g.rx*1.15}" ry="7" fill="${m.c.m}" opacity=".55"/>`;
}
function earsF(m,g,st){
  const top=g.cy-g.ry, x=g.rx*0.55, h=18+st*7;
  function ear(sgn){
    const bx=100+sgn*x;
    return `<path d="M ${bx-sgn*12} ${top+14} L ${bx+sgn*4} ${top-h} L ${bx+sgn*14} ${top+10} Z" fill="${m.c.m}"/>`+
           `<path d="M ${bx-sgn*4} ${top+10} L ${bx+sgn*4} ${top-h*0.5} L ${bx+sgn*9} ${top+8} Z" fill="${m.c.b}"/>`;
  }
  return ear(-1)+ear(1);
}
function tailF(m,g,st){
  const sx=100+g.rx*0.8, sy=g.cy+g.ry*0.4, L=22+st*8;
  const ex=sx+L, ey=sy-30-st*3;
  return `<path d="M ${sx} ${sy} q ${L*0.9} 6 ${L} -14 q 2 -10 ${-4} -${14+st*3}" stroke="${m.c.m}" stroke-width="8" fill="none" stroke-linecap="round"/>`+
         `<path d="M ${ex-11} ${ey+7} L ${ex+6} ${ey+3} L ${ex-4} ${ey-9} Z" fill="${m.c.d}"/>`;
}
function antennaF(m,g,st){
  const top=g.cy-g.ry;
  function ant(sgn){
    const bx=100+sgn*g.rx*0.3, len=16+st*6;
    const ex=bx+sgn*10, ey=top+4-len;
    return `<path d="M ${bx} ${top+6} q ${sgn*4} ${-len*0.6} ${sgn*10} ${-len+2}" stroke="${m.c.d}" stroke-width="4.5" fill="none" stroke-linecap="round"/>`+
           `<circle cx="${ex}" cy="${ey}" r="${5+st}" fill="${m.c.m}" stroke="${m.c.d}" stroke-width="2"/>`;
  }
  return ant(-1)+ant(1);
}
const PANEL="#241740";
function monsterSVG(m,st,px){
  const g=GEO[st];
  const ghost=m.feats.includes("ghost");
  let back="", front="";
  const all=[...m.feats, ...((st>=3&&m.f3)?m.f3:[])];
  if(all.includes("wings")) back+=wingsF(m,g);
  if(all.includes("spikes")) back+=spikesF(m,g,st);
  if(all.includes("crystals")) back+=crystalsF(m,g,st);
  if(all.includes("bolt")) back+=boltF(m,g,st);
  if(all.includes("tail")) back+=tailF(m,g,st);
  // legs / arms (not for ghost or tentacle monsters)
  let limbs="";
  if(st>=2 && !ghost && !all.includes("tentacles")){
    const fy=g.cy+g.ry-4;
    limbs+=`<ellipse cx="${100-g.rx*0.45}" cy="${fy}" rx="14" ry="11" fill="${m.c.d}"/>`+
           `<ellipse cx="${100+g.rx*0.45}" cy="${fy}" rx="14" ry="11" fill="${m.c.d}"/>`;
    const ay=g.cy-g.ry*0.1, ang=st===3?-35:20;
    limbs+=`<ellipse cx="${100-g.rx*0.95}" cy="${ay}" rx="10" ry="${14+st*3}" fill="${m.c.m}" transform="rotate(${ang} ${100-g.rx*0.95} ${ay})"/>`+
           `<g class="waveR" style="animation-delay:${(-(1.95+Math.random()*0.45)).toFixed(2)}s"><ellipse cx="${100+g.rx*0.95}" cy="${ay}" rx="10" ry="${14+st*3}" fill="${m.c.m}" transform="rotate(${-ang} ${100+g.rx*0.95} ${ay})"/></g>`;
  }
  const body=`<ellipse cx="100" cy="${g.cy}" rx="${g.rx}" ry="${g.ry}" fill="${m.c.m}"/>`+
    `<ellipse cx="100" cy="${g.cy+g.ry*0.32}" rx="${g.rx*0.55}" ry="${g.ry*0.42}" fill="${m.c.b}" opacity=".85"/>`;
  if(all.includes("tentacles")) front+=tentaclesF(m,g,st);
  if(all.includes("horns")) front+=hornsF(m,g,st);
  if(all.includes("ears")) front+=earsF(m,g,st);
  if(all.includes("antenna")) front+=antennaF(m,g,st);
  if(all.includes("flame")) front+=flameF(m,g,st);
  if(all.includes("drips")) back+=dripsF(m,g);
  let tail= ghost? ghostTail(g,PANEL):"";
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${px}" height="${px}" viewBox="0 0 200 200">`+
    back+limbs+body+tail+front+eyes(m,g,st)+mouth(m,g,st)+`</svg>`;
}
function eggSVG(m,cracks,px){
  let cr="";
  if(cracks>=1) cr+=`<path d="M 82 96 l 10 10 l -7 9 l 11 8" stroke="#8a7aa8" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;
  if(cracks>=2) cr+=`<path d="M 120 88 l -8 12 l 10 7 l -6 11" stroke="#8a7aa8" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${px}" height="${px}" viewBox="0 0 200 200">`+
    `<path d="M 100 62 C 132 62 148 100 148 128 C 148 158 126 176 100 176 C 74 176 52 158 52 128 C 52 100 68 62 100 62 Z" fill="#f5edff" stroke="#d8c8f0" stroke-width="3"/>`+
    `<circle cx="86" cy="112" r="9" fill="${m.c.m}" opacity=".8"/>`+
    `<circle cx="116" cy="140" r="12" fill="${m.c.m}" opacity=".8"/>`+
    `<circle cx="112" cy="98" r="6" fill="${m.c.m}" opacity=".8"/>`+
    `<circle cx="80" cy="146" r="7" fill="${m.c.m}" opacity=".8"/>`+cr+`</svg>`;
}
/*MONSTER-ART-END*/

const FEEDS_PER_STAGE=3, TOTAL_FEEDS=12; // æg -> baby -> mellemform -> slutform -> samlet
const CHOMPS=["GNASK!","NAM NAM!","MUMS!","GRRR!","BØVS!","MERE!"];
const SIZE={1:120,2:155,3:190};

let state={collected:[], cur:null, feeds:0};
let currentAnswer=null, locked=false;

async function save(){
  try{ if(window.storage){ await window.storage.set("sixten-monsterlab", JSON.stringify(state)); } }catch(e){}
}
async function load(){
  try{
    if(window.storage){
      const r=await window.storage.get("sixten-monsterlab");
      if(r && r.value) return JSON.parse(r.value);
    }
  }catch(e){}
  return null;
}

let AC=null;
function beep(freqs,dur=0.12,type="square",vol=0.15){
  try{
    if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
    freqs.forEach((f,i)=>{
      const o=AC.createOscillator(), gn=AC.createGain();
      o.type=type; o.frequency.value=f;
      gn.gain.setValueAtTime(vol,AC.currentTime+i*dur);
      gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(i+1)*dur);
      o.connect(gn); gn.connect(AC.destination);
      o.start(AC.currentTime+i*dur); o.stop(AC.currentTime+(i+1)*dur);
    });
  }catch(e){}
}
const sfxYes=()=>beep([392,523,659]);
const sfxNo =()=>beep([200,150],0.16,"sawtooth",0.1);
const sfxWin=()=>beep([523,659,784,1047],0.14);

const $=id=>document.getElementById(id);
function rnd(n){return Math.floor(Math.random()*n);}
function pickNewMonster(){
  const left=MONSTERS.filter(m=>!state.collected.includes(m.id));
  const pool=left.length?left:MONSTERS;
  return pool[rnd(pool.length)].id;
}
function monsterById(id){return MONSTERS.find(m=>m.id===id);}
function stageOf(feeds){return Math.min(Math.floor(feeds/FEEDS_PER_STAGE),3);} // 0=æg,1,2,3

let recent=[]; // husker de sidste opgaver, så de ikke gentages
function makeProblem(){
  const lvl=state.collected.length;
  // Fast blanding: 25% plus, 25% minus, 50% gange.
  // Sværhedsgraden (tallenes størrelse) stiger stadig med antal samlede monstre.
  const ops=["add","sub","mul","mul"];
  let a,b,ans,txt,key,tries=0;
  do{
    const op=ops[rnd(ops.length)];
    if(op==="add"){
      const max = lvl<1?5 : lvl<3?9 : lvl<5?12 : lvl<8?15 : lvl<12?20 : 25;
      a=1+rnd(max); b=1+rnd(max); ans=a+b; txt=`${a} + ${b} = ?`;
      key="a"+Math.min(a,b)+","+Math.max(a,b);
    }else if(op==="sub"){
      // Vælg SVARET først (ellers bliver svaret 1 alt for ofte)
      const maxAns = lvl<1?5 : lvl<3?8 : lvl<5?10 : lvl<8?15 : lvl<12?20 : 25;
      const maxA   = lvl<1?8 : lvl<3?12 : lvl<5?15 : lvl<8?24 : lvl<12?35 : 50;
      ans=1+rnd(maxAns);
      b=1+rnd(Math.max(1,maxA-ans));
      a=ans+b; txt=`${a} − ${b} = ?`;
      key="s"+a+","+b;
    }else{ // mul: kun tal 1-9, starter let men med variation (1-3 gange 1-5)
      const capA = lvl<3?3 : lvl<5?5 : 9;
      const capB = lvl<3?5 : lvl<5?7 : 9;
      a=1+rnd(capA); b=1+rnd(capB);
      if(Math.random()<0.5){ const t=a; a=b; b=t; } // vis begge rækkefølger
      ans=a*b; txt=`${a} × ${b} = ?`;
      key="m"+Math.min(a,b)+","+Math.max(a,b); // 2×3 og 3×2 tæller som samme opgave
    }
  }while(recent.includes(key) && ++tries<15); // ingen af de sidste 4 opgaver igen
  recent.push(key); if(recent.length>4) recent.shift();
  currentAnswer=ans;
  $("problem").textContent=txt;
  const spread = ans>20?5:3; // forkerte svar tæt på det rigtige
  const opts=new Set([ans]);
  let guard=0;
  while(opts.size<3 && guard++<50){
    let d=ans+(rnd(spread*2+1)-spread);
    if(d>=0 && d!==ans) opts.add(d);
  }
  while(opts.size<3) opts.add(ans+opts.size);
  const arr=[...opts].sort(()=>Math.random()-0.5);
  const box=$("answers"); box.innerHTML="";
  arr.forEach(v=>{
    const btn=document.createElement("button");
    btn.className="ans"; btn.textContent=v;
    btn.onclick=()=>answer(btn,v);
    box.appendChild(btn);
  });
}

function renderMonster(){
  const m=monsterById(state.cur), st=stageOf(state.feeds), el=$("monster");
  el.className="";
  if(st===0){
    el.classList.add("egg");
    el.innerHTML=eggSVG(m, state.feeds%FEEDS_PER_STAGE, 115);
    $("monsterName").textContent="???";
    $("stageLabel").textContent="Et mystisk æg... fodr det, så det klækker!";
  }else{
    el.innerHTML=monsterSVG(m,st,SIZE[st]);
    $("monsterName").textContent = (st===1?"Baby ":"") + m.names[st-1].toUpperCase();
    $("stageLabel").textContent = st===1 ? "Fodr den, så den vokser!"
      : st===2 ? "Den bliver større og mere uhyggelig!"
      : "Sidste form! Fodr den helt færdig!";
  }
  const meter=$("meter"); meter.innerHTML="";
  const inStage=state.feeds%FEEDS_PER_STAGE;
  for(let i=0;i<FEEDS_PER_STAGE;i++){
    const s=document.createElement("span");
    s.className="snack"+(i<inStage?" full":"");
    s.textContent="🍖";
    meter.appendChild(s);
  }
  $("bagCount").textContent=state.collected.length;
}

function answer(btn,v){
  if(locked) return;
  if(v===currentAnswer){
    locked=true;
    btn.classList.add("yes"); sfxYes();
    const mEl=$("monster");
    mEl.classList.remove("chomp"); void mEl.offsetWidth; mEl.classList.add("chomp");
    const cw=$("chompWord");
    cw.textContent=CHOMPS[rnd(CHOMPS.length)];
    cw.classList.remove("show"); void cw.offsetWidth; cw.classList.add("show");
    state.feeds++;
    setTimeout(()=>{
      if(state.feeds>=TOTAL_FEEDS){ fullyGrown(); }
      else if(state.feeds%FEEDS_PER_STAGE===0){ evolved(); }
      else { renderMonster(); }
      save(); makeProblem(); locked=false;
    },700);
  }else{
    btn.classList.add("nope"); sfxNo();
    const mEl=$("monster");
    mEl.classList.remove("shake"); void mEl.offsetWidth; mEl.classList.add("shake");
    // Forkert svar: de tre kødben mod næste udvikling nulstilles
    const st=stageOf(state.feeds);
    state.feeds=st*FEEDS_PER_STAGE;
    document.querySelectorAll("#meter .snack").forEach(s=>s.classList.remove("full"));
    if(st===0) setTimeout(()=>renderMonster(),480); // ægget mister også sine revner
    save();
    setTimeout(()=>btn.classList.remove("nope"),500);
  }
}

function evolved(){
  const m=monsterById(state.cur), st=stageOf(state.feeds);
  $("evolveArt").innerHTML=monsterSVG(m,st,180);
  if(st===1){
    $("evolveTitle").textContent="ÆGGET KLÆKKEDE!";
    $("evolveText").textContent="Baby "+m.names[0]+" kom ud! Fodr den, så den vokser!";
  }else{
    $("evolveTitle").textContent="HVAD?! DEN UDVIKLER SIG!";
    $("evolveText").textContent=m.names[st-2]+" udviklede sig til "+m.names[st-1].toUpperCase()+"!";
  }
  $("evolveBtn").textContent="FODR VIDERE!";
  $("evolveOverlay").classList.add("show");
  sfxWin(); confetti(20);
}

function fullyGrown(){
  const m=monsterById(state.cur);
  if(!state.collected.includes(m.id)) state.collected.push(m.id);
  $("evolveArt").innerHTML=monsterSVG(m,3,180);
  $("evolveTitle").textContent="FULDT UDVIKLET!";
  $("evolveText").textContent=m.names[2].toUpperCase()+" er nu i Sixtens monstersamling! Et nyt æg er dukket op...";
  $("evolveBtn").textContent="NYT ÆG!";
  $("evolveOverlay").classList.add("show");
  sfxWin(); confetti(45);
  state.cur=pickNewMonster(); state.feeds=0;
}

$("evolveBtn").onclick=()=>{ $("evolveOverlay").classList.remove("show"); renderMonster(); };

function confetti(n){
  const stuff=["🎉","⭐","💥","🟢","🟠","👾"];
  for(let i=0;i<n;i++){
    const c=document.createElement("div");
    c.className="confetti"; c.textContent=stuff[rnd(stuff.length)];
    c.style.left=rnd(100)+"vw";
    c.style.animationDuration=(1.6+Math.random()*1.6)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3500);
  }
}

$("bagBtn").onclick=()=>{
  const g=$("grid"); g.innerHTML="";
  MONSTERS.forEach(m=>{
    const got=state.collected.includes(m.id);
    const card=document.createElement("div");
    card.className="card "+(got?"got":"mys");
    card.innerHTML=`<div class="art">${monsterSVG(m,3,74)}</div><div class="n">${got?m.names[2]:"???"}</div>`;
    if(got) card.onclick=()=>openDex(m);
    g.appendChild(card);
  });
  $("bag").classList.add("show");
};
$("closeBag").onclick=()=>$("bag").classList.remove("show");

function openDex(m){
  $("dexName").textContent=m.names[2].toUpperCase();
  const chain=$("dexChain"); chain.innerHTML="";
  const sizes={1:60,2:85,3:112};
  for(let st=1;st<=3;st++){
    const step=document.createElement("div");
    step.className="chainStep";
    step.innerHTML=`${monsterSVG(m,st,sizes[st])}<div class="cn">${m.names[st-1]}</div>`;
    chain.appendChild(step);
    if(st<3){
      const arrow=document.createElement("div");
      arrow.className="chainArrow"; arrow.textContent="→";
      chain.appendChild(arrow);
    }
  }
  $("dexFacts").innerHTML=
    `<div class="row"><span class="lbl">OM:</span> ${m.fakta.om}</div>`+
    `<div class="row"><span class="lbl">LIVRET:</span> ${m.fakta.mad}</div>`+
    `<div class="row"><span class="lbl">LYD:</span> ${m.fakta.lyd}</div>`;
  $("dex").classList.add("show");
  beep([330,440,554],0.1);
}
$("closeDex").onclick=()=>$("dex").classList.remove("show");

(async ()=>{
  const saved=await load();
  if(saved && saved.cur){ state=saved; }
  if(!state.cur) state.cur=pickNewMonster();
  renderMonster(); makeProblem();
})();
</script>
</body>
